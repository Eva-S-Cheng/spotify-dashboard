    <script>
      (function () {
        if (window.location.hostname === "www.sound-print.fr") {
          window.location.replace(
            "https://sound-print.fr" +
            window.location.pathname +
            window.location.search +
            window.location.hash
          );
          return;
        }
      })();
      (function () {
        const m = window.location.hash.match(/^#compat=(.+)$/i);
        if (!m) return;
        var raw = m[1];
        try { raw = decodeURIComponent(raw); } catch (e) {}
        try { sessionStorage.setItem('sp_compat_pending', raw); } catch (e) {}
        try { localStorage.setItem('sp_compat_pending_ls', JSON.stringify({ raw: raw, ts: Date.now() })); } catch (e) {}
        try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch (e) {}
      })();
      const p = new URLSearchParams(window.location.search);
      const code = p.get('code');
      if (code) {
        sessionStorage.setItem('sp_code', code);
        window.history.replaceState({}, '', window.location.pathname);
      }
    </script>
