<!DOCTYPE html>
<html>
  <head>
    <script>
      (function () {
        const host = window.location.hostname;
        const apex = host === "www.sound-print.fr" ? "https://sound-print.fr" : window.location.origin;
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        const target = apex + (path === "/404.html" ? "/" : path) + (search || "") + (hash || "");
        window.location.replace(target);
      })();
    </script>
  </head>
</html>
